version: '3.8'

services:
  app:
    image: bitnami/laravel:12
    container_name: laravel
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./appFastLog:/app
    depends_on:
      - mysql
    working_dir: /app
    command: >
      sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: bitnami/mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=localdeveloper
      - MYSQL_DATABASE=appfastlog
    volumes:
      - mysql_data:/bitnami/mysql/data

volumes:
  mysql_data:
    driver: local